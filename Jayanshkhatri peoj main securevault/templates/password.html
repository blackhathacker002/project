<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureVault - Password</title>

    <style>
:root {
    --gold: #f0a500;
    --amber: #f5c842;
    --orange: #e86210;
    --bg: #0a0800;
    --bg-card: #110e00;
    --bg-input: #1a1500;
    --border-dim: rgba(240,165,0,0.13);
    --border-mid: rgba(240,165,0,0.28);
    --border-glow: rgba(240,165,0,0.55);
    --text-muted: #9a8050;
    --text-dim: #5a4a20;
    --text-body: #c8a85a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    background: var(--bg);
    color: var(--text-body);
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

/* SMOOTH FADE */
body {
    opacity: 0;
    transition: opacity 0.4s ease;
}
body.loaded { opacity: 1; }

/* ───────── BACKGROUND (MATCH EDITOR) ───────── */
.auth-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
}

.auth-bg span:nth-child(1) {
    position: absolute;
    top: -160px;
    right: -160px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,200,66,0.07) 0%, transparent 70%);
}

.auth-bg span:nth-child(2) {
    position: absolute;
    bottom: -180px;
    left: -100px;
    width: 460px;
    height: 460px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,165,0,0.06) 0%, transparent 70%);
}

.auth-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(var(--border-dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-dim) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.3;
}

/* ───────── LAYOUT ───────── */
.auth-container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
}

/* ───────── CARD (MATCH PREMIUM CARD) ───────── */
.auth-box {
    width: 100%;
    max-width: 420px;
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 18px;
    padding: 2.6rem 2rem;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.45s ease both;
}

.auth-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--amber), var(--gold), var(--orange), transparent);
}

/* ENTRY ANIMATION */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ───────── HEADER ───────── */
.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.logo {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--amber), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.logo::before {
    content: '⬡ ';
    color: var(--gold);
}

.subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 0.4rem;
}

/* ───────── FLASH MESSAGE ───────── */
.flash-message {
    background: rgba(232,98,16,0.12);
    border: 1px solid rgba(232,98,16,0.35);
    border-radius: 8px;
    padding: 0.65rem 1rem;
    font-size: 0.82rem;
    color: #f5a060;
    text-align: center;
    margin-bottom: 1.2rem;
}

/* ───────── FORM ───────── */
form {
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}

.input-group label {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
}

.input-group input {
    background: var(--bg-input);
    border: 1px solid var(--border-dim);
    border-radius: 9px;
    padding: 0.7rem 0.9rem;
    font-size: 0.9rem;
    color: #e8d08a;
    outline: none;
    transition: 0.2s;
}

.input-group input::placeholder {
    color: var(--text-dim);
}

.input-group input:focus {
    border-color: var(--border-glow);
    background: #1e1800;
}

/* ───────── BUTTON (MATCH EDITOR BUTTON) ───────── */
.auth-btn {
    margin-top: 0.6rem;
    width: 100%;
    padding: 0.75rem;
    border: none;
    border-radius: 9px;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    cursor: pointer;
    background: linear-gradient(135deg, var(--gold), var(--amber), var(--orange));
    color: #1a1000;
    transition: 0.2s;
}

.auth-btn:hover {
    opacity: 0.9;
}

.auth-btn:active {
    transform: scale(0.98);
}

/* ───────── FOOTER ───────── */
.auth-footer {
    margin-top: 1.6rem;
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
}
    </style>

    <link rel="stylesheet" href="/static/auth.css">
</head>

<body>

<div class="auth-bg">
    <span></span>
    <span></span>
</div>

<div class="auth-container">
<div class="auth-box">

    <div class="auth-header">
        <h1 class="logo">SecureVault</h1>
        <p class="subtitle">Password Authentication</p>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="flash-message">{{ messages[0] }}</div>
    {% endif %}
    {% endwith %}

    <form method="POST" autocomplete="off">

        <div class="input-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter your secure password"
                required
                autocomplete="new-password">
        </div>

        <button class="auth-btn">Unlock Vault</button>

    </form>

    <div class="auth-footer">
        <p>Hash Verified • Secure Layer Active • SecureVault</p>
    </div>

</div>
</div>

<script>
window.addEventListener("load", () => {
    document.body.classList.add("loaded");
});
setTimeout(() => {
    const flash = document.querySelector(".flash-message");
    if (flash) {
        flash.style.opacity = "0";
        setTimeout(() => flash.remove(), 300);
    }
}, 3000);
</script>

</body>
</html>
