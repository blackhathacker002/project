<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Decrypted Output - SecureVault</title>
<link rel="stylesheet" href="/static/style.css">

<style>
:root {
    --gold: #f0a500;
    --amber: #f5c842;
    --orange: #e86210;
    --bg: #0a0800;
    --bg-card: #110e00;
    --bg-output: #080600;
    --border-dim: rgba(240,165,0,0.13);
    --border-mid: rgba(240,165,0,0.28);
    --text-muted: #9a8050;
    --text-dim: #5a4a20;
    --text-body: #c8a85a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    background: var(--bg);
    color: var(--text-body);
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

body {
    opacity: 0;
    transition: opacity 0.35s ease;
}
body.loaded { opacity: 1; }

.bg-glow {
    position: fixed; inset: 0;
    pointer-events: none; overflow: hidden; z-index: 0;
}
.bg-glow span:nth-child(1) {
    position: absolute; top: -160px; left: -160px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(240,165,0,0.07) 0%, transparent 70%);
}
.bg-glow span:nth-child(2) {
    position: absolute; bottom: -180px; right: -100px;
    width: 460px; height: 460px; border-radius: 50%;
    background: radial-gradient(circle, rgba(232,98,16,0.07) 0%, transparent 70%);
}
.bg-glow span:nth-child(3) {
    position: absolute; inset: 0;
    background-image:
        linear-gradient(var(--border-dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-dim) 1px, transparent 1px);
    background-size: 60px 60px; opacity: 0.3;
}

.page-container {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 3rem 1.5rem;
}

.back-btn.premium-back {
    align-self: flex-start; margin-bottom: 1.5rem;
    font-size: 0.8rem; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text-muted);
    text-decoration: none; border: 1px solid var(--border-dim);
    border-radius: 8px; padding: 0.45rem 0.85rem;
    transition: color 0.2s, border-color 0.2s;
}
.back-btn.premium-back:hover { color: var(--amber); border-color: var(--border-mid); }

.premium-card {
    background: var(--bg-card); border: 1px solid var(--border-dim);
    border-radius: 18px; padding: 2.5rem 2rem;
    width: 100%; max-width: 600px;
    position: relative; overflow: hidden;
}
.premium-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--amber), var(--orange), transparent);
}

.fade-in { animation: fadeUp 0.45s ease both; }
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
}

.tag {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--orange); margin-bottom: 0.6rem;
}

.title {
    font-size: 1.5rem; font-weight: 700; letter-spacing: 0.03em;
    background: linear-gradient(135deg, var(--amber), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.5rem;
}

.subtitle {
    font-size: 0.85rem; color: var(--text-muted);
    line-height: 1.65; margin-bottom: 1.5rem;
}

/* ── OUTPUT BOX ── */
.output-wrapper {
    background: var(--bg-output);
    border: 1px solid var(--border-dim);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1.5rem;
}

.output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.65rem 1rem;
    border-bottom: 1px solid var(--border-dim);
    background: rgba(240,165,0,0.04);
}

.output-header span {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
}

.copy-btn {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--amber);
    background: rgba(240,165,0,0.08);
    border: 1px solid var(--border-mid);
    border-radius: 6px;
    padding: 0.3rem 0.75rem;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, color 0.2s;
}
.copy-btn:hover { background: rgba(240,165,0,0.15); }

#outputData {
    padding: 1.25rem;
    font-family: 'Courier New', 'Consolas', monospace;
    font-size: 0.875rem;
    color: #c8a850;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.7;
    max-height: 320px;
    overflow-y: auto;
}

/* ── ACTION ROW ── */
.action-row {
    display: flex;
    gap: 0.75rem;
}

.premium-btn {
    flex: 1; padding: 0.7rem;
    border: none; border-radius: 9px; font-size: 0.83rem;
    font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; background: linear-gradient(135deg, var(--gold), var(--amber), var(--orange));
    color: #1a1000; font-family: inherit; text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.15s;
}
.premium-btn:hover { opacity: 0.88; }
.premium-btn:active { transform: scale(0.98); }

.premium-btn.small { font-size: 0.8rem; }

.premium-btn.outline {
    background: transparent;
    border: 1px solid var(--border-mid);
    color: var(--amber);
}
.premium-btn.outline:hover { background: rgba(240,165,0,0.07); }
</style>

</head>

<body>

<div class="bg-glow">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="page-container">

    <a href="/dashboard" class="back-btn premium-back">
        ← Back to Dashboard
    </a>

    <div class="premium-card fade-in">

        <p class="tag">DECRYPTION SUCCESS</p>
        <h1 class="title">{{ filename }}</h1>
        <p class="subtitle">File successfully decrypted and restored</p>

        <div class="output-wrapper">

            <div class="output-header">
                <span>Decrypted Data</span>
                <button onclick="copyData()" class="copy-btn">Copy</button>
            </div>

            <pre id="outputData">{{ data }}</pre>

        </div>

        <div class="action-row">

            <a href="/dashboard" class="premium-btn small">
                Dashboard
            </a>

            <a href="/decrypt" class="premium-btn small outline">
                Decrypt Again
            </a>

        </div>

    </div>

</div>

<script>
function copyData() {
    const text = document.getElementById("outputData").innerText;
    navigator.clipboard.writeText(text);
    const btn = document.querySelector(".copy-btn");
    btn.innerText = "Copied ✓";
    setTimeout(() => { btn.innerText = "Copy"; }, 2000);
}

window.addEventListener("load", () => {
    document.body.classList.add("loaded");
});
</script>

</body>
</html>
